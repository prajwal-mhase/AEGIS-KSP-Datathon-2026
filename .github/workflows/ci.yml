name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: sutra
          POSTGRES_PASSWORD: sutra
          POSTGRES_DB: sutra
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://sutra:sutra@localhost:5432/sutra
      JWT_ACCESS_SECRET: ci-access-secret-with-at-least-thirty-two-chars
      JWT_REFRESH_SECRET: ci-refresh-secret-with-at-least-thirty-two-chars
      CLIENT_ORIGIN: http://localhost:5173
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install
      - run: npm run build
      - run: npm run lint
      - run: npm test
